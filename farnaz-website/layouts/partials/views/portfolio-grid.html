{{ $item := .item }}

{{/* Find the featured image for the item */}}
{{ $image := "" }}
{{ if $item.Resources }}
{{ $image = $item.Resources.GetMatch "featured.*" }}
{{ end }}

<div x-data="{ modalOpen: false }" class="w-full">
    {{ if $image }}
    <div @click="modalOpen = true" class="cursor-pointer mb-4 relative group overflow-hidden bg-gray-100 rounded-lg shadow-sm w-full" style="aspect-ratio: 1 / 1;">
        <img src="{{ $image.RelPermalink }}" loading="lazy" alt="{{ $item.Title }}"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
        <div
            class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent p-4 opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none">
            <h3 class="text-white font-semibold text-sm leading-tight m-0 p-0 text-center">{{ $item.Title }}</h3>
        </div>
    </div>
    
    <!-- Modal overlay -->
    <div x-show="modalOpen" style="display: none;"
         @keydown.escape.window="modalOpen = false"
         class="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/95 backdrop-blur-sm shadow-2xl overflow-y-auto"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="modalOpen = false">
        
        <!-- Close button -->
        <button type="button" class="absolute top-4 right-4 text-gray-300 hover:text-white focus:outline-none transition-colors p-2 z-50 bg-black/20 hover:bg-black/40 rounded-full" @click="modalOpen = false">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>

        <!-- Full image -->
        <img @click.stop="" src="{{ $image.RelPermalink }}" alt="{{ $item.Title }}" 
             class="max-w-full max-h-[85vh] object-contain rounded shadow-2xl relative z-10 mx-auto block" />
             
        <!-- Caption -->
        <div class="fixed bottom-6 left-0 right-0 text-center pointer-events-none z-20">
            <span class="inline-block bg-black/60 backdrop-blur-md text-white/90 px-6 py-2.5 rounded-full text-sm font-medium shadow-lg">{{ $item.Title }}</span>
        </div>
    </div>
    {{ else }}
    <div class="mb-4 relative group overflow-hidden bg-gray-100 rounded-lg shadow-sm w-full" style="aspect-ratio: 1 / 1;">
        <!-- Fallback if no image -->
        <div class="p-6 bg-white dark:bg-slate-800 h-full flex flex-col justify-center text-center">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{ $item.Title }}</h3>
        </div>
    </div>
    {{ end }}
</div>
